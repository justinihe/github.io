  <meta charset="UTF-8">

  <link rel="stylesheet" href="./node_modules/@fortawesome/fontawesome-free/css/all.css">
</head>
<body>
<header>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">VC</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" id="opportune" href="opportunity.html">Opportunities</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="events.html">Events</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="contact.html">Contact Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              More
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Privacy Policy</a></li>
              <li><a class="dropdown-item" href="#">Terms of Service</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
<main class="container mx-auto">
  <div class="modal fade" id="modalConfirmation" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirmation Message</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <span>Thank You for your message!!</span>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>
  <form class="col" style="width: 28rem;">
    <h1 class="text-center">Contact Us</h1>
    <span id="contactInfo"></span>
    <div class="col my-2">
      <input type="text" id="fullNameContact" name="fullNameContact" class="form-control" placeholder="Full name" aria-label="Full name" required>
    </div>
    <div class="col">
      <input type="email" name="emailContact" placeholder="Email" class="form-control" id="emailContact" required>
    </div>
    <div class="col my-2">
      <input type="text" name="subject" id="subject" class="form-control" placeholder="Subject" aria-label="Preferred Role" required>
    </div>
    <div class="col my-2">
      <input type="text" name="message" id="message" class="form-control" placeholder="Message" aria-label="Preferred Role" required>
    </div>
    <div class="col my-2 w-100">
      <button type="submit" id="submitMessaage" class="btn btn-primary" data-bs-dismiss="modal">Submit</button>
    </div>
  </form>
</main>

<script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/main.js"></script>
</body>
</html>
